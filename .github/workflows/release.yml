name: Release

permissions:
  contents: read

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check-version:
    name: Check version consistency
    if: github.repository == 'ayrna/skordinal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check versions match
        env:
          RELEASE_TITLE: ${{ github.event.release.name }}
        run: python .github/scripts/check_version_consistency.py

  build-sdist:
    name: Build source distribution
    needs: check-version
    if: github.repository == 'ayrna/skordinal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel cp${{ matrix.python-version }}-manylinux_x86_64
    needs: check-version
    if: github.repository == 'ayrna/skordinal'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["39", "310", "311", "312"]
    steps:
      - uses: actions/checkout@v6
      - uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-manylinux_x86_64
          CIBW_SKIP: "*-musllinux_*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: >
            python -c "import skordinal;
            print(f'skordinal {skordinal.__version__} imported');
            import skordinal.classifiers._libsvmrank;
            import skordinal.classifiers._libsvorex;
            print('C extensions loaded')"
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-cp${{ matrix.python-version }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    if: github.repository == 'ayrna/skordinal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/skordinal/
    permissions:
      id-token: write
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
